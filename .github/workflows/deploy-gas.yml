name: Deploy Google Apps Script

on:
  push:
    branches:
      - main
    paths:
      - 'gas-staff/**'
      - 'gas-audience/**'
      - '.github/workflows/deploy-gas.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Create clasprc.json
        env:
          REFRESH_TOKEN: ${{ secrets.CLASP_REFRESH_TOKEN }}
        run: |
          node -e "
          const fs = require('fs');
          const data = {
            token: {
              access_token: '',
              refresh_token: process.env.REFRESH_TOKEN,
              scope: 'https://www.googleapis.com/auth/script.deployments https://www.googleapis.com/auth/script.projects https://www.googleapis.com/auth/script.webapp.deploy https://www.googleapis.com/auth/drive.metadata.readonly https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/service.management https://www.googleapis.com/auth/logging.read https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/cloud-platform',
              token_type: 'Bearer',
              expiry_date: 0
            },
            oauth2ClientSettings: {
              clientId: '1072944905499-vm2v2i5dvn0a0d2o4ca36i1vge8cvbn0.apps.googleusercontent.com',
              clientSecret: 'v6V3fKV_zWU7iw1DrpO1rknX',
              redirectUri: 'http://localhost'
            },
            isLocalCreds: false
          };
          fs.writeFileSync(require('os').homedir() + '/.clasprc.json', JSON.stringify(data));
          "

      - name: Deploy Staff GAS
        working-directory: ./gas-staff
        run: clasp push -f

      - name: Deploy Audience GAS
        working-directory: ./gas-audience
        run: clasp push -f
