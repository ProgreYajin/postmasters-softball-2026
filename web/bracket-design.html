<script>
// ──────────────────────────────────────────────
//  勝敗データ
//  winner: チーム名を設定すると赤線ハイライト
//  null = 未決定
// ──────────────────────────────────────────────
const data = {
  matchA: { t1: '東部',  t2: '東南', winner: '東部'  }, // ← テスト
  matchB: { t1: '北部',  t2: '西部', winner: '北部'  }, // ← テスト
  matchC: { t1: '中部',  t2: '南部', winner: null     },
  matchD: { t1: '印旛',  t2: null,   winner: '印旛'  }, // ← テスト
  matchE: { t1: null,    t2: null,   winner: null     },
  matchF: { t1: null,    t2: null,   winner: null     },
  matchG: { t1: null,    t2: null,   winner: null     },
};

// ── スタイル定数 ──
const WIN  = { stroke: '#e53935', width: 3.5 };
const LOSE = { stroke: '#ddd',    width: 1.5 };
const DEF  = { stroke: '#bbb',    width: 2   };

function applyStyle(id, s) {
  const el = document.getElementById(id);
  if (!el) return;
  el.setAttribute('stroke', s.stroke);
  el.setAttribute('stroke-width', s.width);
}

function updateBracket() {
  // 全ラインをデフォルトに戻す
  ['lt0','lt1','lt2','lt3','lt4','lt5','lt6',
   'bA','wA','bB','wB','bC','wC',
   'bD','wD','bE','wE','bG','wG',
   'lld','lle','bF','wF'
  ].forEach(id => applyStyle(id, DEF));

  const d = data;

  // 試合A
  if (d.matchA.winner) {
    const w1 = d.matchA.winner === d.matchA.t1;
    applyStyle('lt1', w1 ? WIN : LOSE);
    applyStyle('lt2', w1 ? LOSE : WIN);
    applyStyle('bA',  WIN);
    applyStyle('wA',  WIN);
  }

  // 試合B
  if (d.matchB.winner) {
    const w1 = d.matchB.winner === d.matchB.t1;
    applyStyle('lt3', w1 ? WIN : LOSE);
    applyStyle('lt4', w1 ? LOSE : WIN);
    applyStyle('bB',  WIN);
    applyStyle('wB',  WIN);
  }

  // 試合C
  if (d.matchC.winner) {
    const w1 = d.matchC.winner === d.matchC.t1;
    applyStyle('lt5', w1 ? WIN : LOSE);
    applyStyle('lt6', w1 ? LOSE : WIN);
    applyStyle('bC',  WIN);
    applyStyle('wC',  WIN);
  }

  // 試合D（印旛 vs A勝者）
  if (d.matchD.winner) {
    applyStyle('lt0', d.matchD.winner === '印旛' ? WIN : LOSE);
    // A勝者アーム (wA) は matchA の結果で色付け済み
    applyStyle('bD',  WIN);
    applyStyle('wD',  WIN);
  }

  // 試合E
  if (d.matchE.winner) {
    applyStyle('bE', WIN);
    applyStyle('wE', WIN);
  }

  // 試合G（決勝）
  if (d.matchG.winner) {
    applyStyle('bG', WIN);
    applyStyle('wG', WIN);
  }

  // 試合F（3位決定戦）
  if (d.matchF.winner) {
    applyStyle('lld', WIN);
    applyStyle('lle', WIN);
    applyStyle('bF',  WIN);
    applyStyle('wF',  WIN);
  }
}

updateBracket();
</script>
