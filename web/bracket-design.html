<script>
// ──────────────────────────────────────────────────
//  勝敗データ
//  winner: チーム名（文字列）→ 赤線ハイライト
//  null    → 未決定
// ──────────────────────────────────────────────────
const data = {
  matchA: { t1: '東部',  t2: '東南', winner: '東部'  }, // テスト
  matchB: { t1: '北部',  t2: '西部', winner: '北部'  }, // テスト
  matchC: { t1: '中部',  t2: '南部', winner: null     },
  matchD: { t1: '印旛',  t2: null,   winner: '印旛'  }, // テスト
  matchE: { t1: null,    t2: null,   winner: null     },
  matchF: { t1: null,    t2: null,   winner: null     },
  matchG: { t1: null,    t2: null,   winner: null     },
};

const RED = '#FF0000';

function red(id) {
  const el = document.getElementById('r-' + id);
  if (el) el.setAttribute('stroke', RED);
}

function updateBracket() {
  // 試合A
  if (data.matchA.winner) {
    const t1w = data.matchA.winner === data.matchA.t1;
    red(t1w ? 'lt1' : 'lt2');   // 勝者の縦ライン
    red('bA');                    // A横バー
    red('wA');                    // A勝者アーム
  }

  // 試合B
  if (data.matchB.winner) {
    const t1w = data.matchB.winner === data.matchB.t1;
    red(t1w ? 'lt3' : 'lt4');
    red('bB');
    red('wB');
  }

  // 試合C
  if (data.matchC.winner) {
    const t1w = data.matchC.winner === data.matchC.t1;
    red(t1w ? 'lt5' : 'lt6');
    red('bC');
    red('wC');
  }

  // 試合D（印旛 vs A勝者）
  if (data.matchD.winner) {
    red(data.matchD.winner === '印旛' ? 'lt0' : 'wA'); // 印旛 stem or A winner arm
    red('bD');
    red('wD');
  }

  // 試合E
  if (data.matchE.winner) {
    red('bE');
    red('wE');
  }

  // 試合G（決勝）
  if (data.matchG.winner) {
    red('bG');
    red('wG');
  }

  // 試合F（3位決定戦）
  if (data.matchF.winner) {
    red('lld');
    red('lle');
    red('bF');
    red('wF');
  }
}

updateBracket();
</script>
