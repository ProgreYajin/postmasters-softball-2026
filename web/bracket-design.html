<script>
// ─── 勝敗データ ───────────────────────────────────────────────
// winner: チーム名を設定すると赤線ハイライト。null=未決定
const data = {
  matchA: { t1: '東部',  t2: '東南', winner: '東部'  },  // テスト: 東部が勝利
  matchB: { t1: '北部',  t2: '西部', winner: '北部'  },  // テスト: 北部が勝利
  matchC: { t1: '中部',  t2: '南部', winner: null     },
  matchD: { t1: '印旛',  t2: null,   winner: '印旛'  },  // テスト: 印旛が勝利
  matchE: { t1: null,    t2: null,   winner: null     },
  matchF: { t1: null,    t2: null,   winner: null     },
  matchG: { t1: null,    t2: null,   winner: null     },
};

// ─── スタイル定数 ────────────────────────────────────────────
const WIN  = { stroke: '#e53935', width: 3.5 };
const LOSE = { stroke: '#ddd',    width: 1.5 };
const DEF  = { stroke: '#bbb',    width: 2   };

function style(el, s) {
  el.setAttribute('stroke', s.stroke);
  el.setAttribute('stroke-width', s.width);
}

function seg(id, s) {
  const el = document.getElementById(id);
  if (el) style(el, s);
}

// ─── ハイライト更新 ──────────────────────────────────────────
function update() {
  // 全セグメントをデフォルト
  ['lt0','lt1','lt2','lt3','lt4','lt5','lt6',
   'bA','wA','bB','wB','bC','wC',
   'bD','wD','bE','wE','bG','wG',
   'lld','lle','bF','wF'
  ].forEach(id => seg(id, DEF));

  const d = data;

  // 試合A
  if (d.matchA.winner) {
    const t1w = d.matchA.winner === d.matchA.t1;
    seg('lt1', t1w ? WIN : LOSE);
    seg('lt2', t1w ? LOSE : WIN);
    seg('bA',  WIN);
    seg('wA',  WIN);
  }

  // 試合B
  if (d.matchB.winner) {
    const t1w = d.matchB.winner === d.matchB.t1;
    seg('lt3', t1w ? WIN : LOSE);
    seg('lt4', t1w ? LOSE : WIN);
    seg('bB',  WIN);
    seg('wB',  WIN);
  }

  // 試合C
  if (d.matchC.winner) {
    const t1w = d.matchC.winner === d.matchC.t1;
    seg('lt5', t1w ? WIN : LOSE);
    seg('lt6', t1w ? LOSE : WIN);
    seg('bC',  WIN);
    seg('wC',  WIN);
  }

  // 試合D（印旛 vs A勝者）
  if (d.matchD.winner) {
    const seedWon = d.matchD.winner === '印旛';
    seg('lt0', seedWon ? WIN : LOSE);
    // A勝者アームはmatchAの結果で既に色付け済み（そちらで判断）
    if (!seedWon && d.matchA.winner) {
      // A勝者がD勝者 → wAも維持（既にWINのはず）
    }
    seg('bD',  WIN);
    seg('wD',  WIN);
  } else if (d.matchD.winner === null) {
    // 印旛のスタムはデフォルトのまま
  }

  // 試合E（B勝者 vs C勝者）
  if (d.matchE.winner) {
    seg('bE', WIN);
    seg('wE', WIN);
  }

  // 試合G（決勝）
  if (d.matchG.winner) {
    seg('bG', WIN);
    seg('wG', WIN);
  }

  // 試合F（3位決定戦）
  if (d.matchF.winner) {
    seg('bF', WIN);
    seg('wF', WIN);
  }
}

update();
</script>
