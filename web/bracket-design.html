<script>
// ══════════════════════════════════════════════════
// トーナメントデータ
//   winner: 1 = t1勝利, 2 = t2勝利, null = 未確定
//   t2 of D は A勝者（試合後に解決済みの実チーム名を入れる）
//   t1/t2 of E は B/C勝者、G は D/E勝者、F は D/E敗者
// ══════════════════════════════════════════════════
const matches = {
    A: { t1: '東部', t2: '東南', s1: 3, s2: 1, winner: 1 },
    B: { t1: '北部', t2: '西部', s1: 5, s2: 0, winner: 1 },
    C: { t1: '中部', t2: '南部', s1: 2, s2: 4, winner: 2 },
    D: { t1: '印旛', t2: '東部', s1: 3, s2: 0, winner: 1 },  // t2 = A勝者
    E: { t1: '北部', t2: '南部', s1: 1, s2: 2, winner: 2 },  // t1 = B勝者, t2 = C勝者
    G: { t1: '印旛', t2: '南部', s1: 5, s2: 4, winner: 1 },  // t1 = D勝者, t2 = E勝者
    F: { t1: '東部', t2: '北部', s1: 0, s2: 3, winner: 2 }   // t1 = D敗者, t2 = E敗者
};

const RED = '#e53935';

function updateBracket() {

    // ── スコアテキスト更新 ──
    // 勝者名を赤・太字、敗者名をグレー、スコアを赤・太字で表示
    function setScore(matchId, m) {
        const el = document.getElementById('score-' + matchId);
        if (!el || m.s1 === null || m.s2 === null) return;

        const c1 = (m.winner === 1) ? RED : '#888';
        const c2 = (m.winner === 2) ? RED : '#888';
        const fw1 = (m.winner === 1) ? 'bold' : 'normal';
        const fw2 = (m.winner === 2) ? 'bold' : 'normal';

        // tspan で勝者を強調（SVG innerHTML は主要ブラウザで対応済み）
        el.innerHTML =
            `<tspan font-weight="${fw1}" fill="${c1}">${m.t1}</tspan>` +
            `<tspan font-weight="bold" fill="${RED}"> ${m.s1} - ${m.s2} </tspan>` +
            `<tspan font-weight="${fw2}" fill="${c2}">${m.t2}</tspan>`;
    }

    ['A','B','C','D','E','G','F'].forEach(id => setScore(id, matches[id]));

    // ── 赤線活性化 ──
    // まず全赤線をリセット
    document.querySelectorAll('[id^="r-"]').forEach(el => el.setAttribute('stroke', 'none'));

    function red(id) {
        const el = document.getElementById('r-' + id);
        if (el) el.setAttribute('stroke', RED);
    }

    // 試合A: ①東部(lt1, 左) vs ②東南(lt2, 右)
    if      (matches.A.winner === 1) { red('lt1'); red('bA'); red('wA'); }
    else if (matches.A.winner === 2) { red('lt2'); red('bA'); red('wA'); }

    // 試合B: ③北部(lt3, 左) vs ④西部(lt4, 右)
    if      (matches.B.winner === 1) { red('lt3'); red('bB'); red('wB'); }
    else if (matches.B.winner === 2) { red('lt4'); red('bB'); red('wB'); }

    // 試合C: ⑤中部(lt5, 左) vs ⑥南部(lt6, 右)
    if      (matches.C.winner === 1) { red('lt5'); red('bC'); red('wC'); }
    else if (matches.C.winner === 2) { red('lt6'); red('bC'); red('wC'); }

    // 試合D: 印旛(lt0, シード側) vs A勝者(wA 経由)
    //   印旛勝ち → lt0 を追加（wA はすでに A で活性化済み）
    //   A勝者勝ち → wA はすでに赤いのでバーと勝者アームのみ
    if      (matches.D.winner === 1) { red('lt0'); red('bD'); red('wD'); }
    else if (matches.D.winner === 2) {             red('bD'); red('wD'); }

    // 試合E: B勝者(wB 経由) vs C勝者(wC 経由)
    //   入力アームは両側すでに活性化済みなのでバーと勝者アームのみ
    if (matches.E.winner !== null) { red('bE'); red('wE'); }

    // 試合G: D勝者(wD 経由) vs E勝者(wE 経由)
    if (matches.G.winner !== null) { red('bG'); red('wG'); }

    // 試合F: D敗者(lld, 左) vs E敗者(lle, 右)
    if      (matches.F.winner === 1) { red('lld'); red('bF'); red('wF'); }
    else if (matches.F.winner === 2) { red('lle'); red('bF'); red('wF'); }
}

updateBracket();
</script>
