<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>2026年度千葉県郵便局長ソフトボール大会 組み合わせ表</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic Pro', 'メイリオ', sans-serif;
      background: #f0f2f5;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 18px;
      margin-bottom: 6px;
      color: #333;
      letter-spacing: 1px;
    }
    .subtitle {
      text-align: center;
      font-size: 12px;
      color: #666;
      margin-bottom: 16px;
    }

    /* 凡例 */
    .legend {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 14px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #444;
    }
    .legend-color {
      width: 20px;
      height: 14px;
      border-radius: 3px;
      border: 2px solid;
    }
    .legend-nagashima { background: #e8f8e8; border-color: #4caf50; }
    .legend-second    { background: #e3f2fd; border-color: #2196f3; }

    /* スクロールコンテナ */
    .bracket-scroll {
      overflow-x: auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.12);
      padding: 24px 20px 20px;
    }

    /* ブラケット本体 */
    .bracket-container {
      position: relative;
      width: 1010px;
      height: 670px;
    }

    /* ──── 線 ──── */
    .vl, .hl {
      position: absolute;
      background: #555;
      z-index: 1;
    }
    .vl { width: 2px; }
    .hl { height: 2px; }

    /* ──── チームボックス ──── */
    .team-box {
      position: absolute;
      width: 68px;
      height: 95px;
      border: 2px solid #555;
      border-radius: 5px;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 20;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }
    .team-box.seed {
      border-color: #c0392b;
      border-width: 2.5px;
    }
    .team-num  { font-size: 12px; color: #888; line-height: 1.2; }
    .team-name { font-size: 17px; font-weight: bold; color: #222; margin: 3px 0; }
    .team-side { font-size: 10px; color: #999; line-height: 1.2; }
    .seed-tag  {
      font-size: 9px; color: #c0392b;
      background: #fdecea;
      padding: 1px 5px;
      border-radius: 2px;
      margin-top: 2px;
    }

    /* ──── 試合ボックス ──── */
    .match-box {
      position: absolute;
      width: 78px;
      height: 80px;
      border: 2px solid #555;
      border-radius: 7px;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 20;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      padding: 4px;
    }
    .match-box.nagashima { background: #e8f8e8; border-color: #4caf50; }
    .match-box.second    { background: #e3f2fd; border-color: #2196f3; }
    .match-box.final {
      background: linear-gradient(135deg, #fff9e6, #fff3cd);
      border-color: #e0a800;
      border-width: 2.5px;
    }
    .match-label { font-size: 22px; font-weight: bold; color: #333; line-height: 1; }
    .match-box.nagashima .match-label { color: #2e7d32; }
    .match-box.second    .match-label { color: #1565c0; }
    .match-box.final     .match-label { color: #7d5a00; }
    .match-time  { font-size: 12px; color: #555; margin: 2px 0 1px; }
    .match-venue { font-size: 10px; color: #777; line-height: 1.2; }

    /* ──── 優勝ボックス ──── */
    .champion-box {
      position: absolute;
      width: 140px;
      height: 62px;
      background: linear-gradient(135deg, #f6d365, #fda085);
      border: 3px solid #e67e22;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }
    .champion-box .crown { font-size: 20px; line-height: 1; }
    .champion-box .champ-label { font-size: 16px; font-weight: bold; color: #5d2e00; margin-top: 2px; }

    /* ──── 3位決定戦 ──── */
    .third-section {
      position: absolute;
      right: 0;
      top: 0;
      width: 242px;
    }
    .third-header {
      position: absolute;
      width: 242px;
      height: 38px;
      background: #fff9c4;
      border: 2px solid #f9a825;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: bold;
      color: #5d4037;
      z-index: 20;
      top: 25px;
      right: 0;
    }
    .loser-box {
      position: absolute;
      width: 68px;
      height: 80px;
      border: 2px dashed #999;
      border-radius: 5px;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 20;
      color: #888;
      font-size: 11px;
      line-height: 1.4;
    }
    .loser-box .loser-label { font-size: 12px; font-weight: bold; color: #666; }

    /* 3位ボックス */
    .third-box {
      position: absolute;
      width: 140px;
      height: 50px;
      background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
      border: 2px solid #66bb6a;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      font-size: 15px;
      font-weight: bold;
      color: #2e7d32;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
  </style>
</head>
